<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Samsari hjelper virksomheter å få mer verdi ut av Microsoft 365 med Power Platform, automatisering og AI."
    />
    <title>Samsari</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('samsari-theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (error) {
          console.warn('Theme preload failed', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
